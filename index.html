<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IronComposer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app">
    <header id="toolbar">
      <span id="logo">⚙ IronComposer</span>
      <div class="toolbar-actions">
        <button id="btn-add-folder" class="btn-toolbar" title="Adicionar pasta da biblioteca">
          + Add Folder
        </button>
      </div>
    </header>

    <div id="tabs">
      <div class="tab active" data-tab="browse">Browse</div>
      <div class="tab" data-tab="favorites">★ Favoritos</div>
    </div>

    <div id="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Pesquisar arquivos..." autocomplete="off" />
      <button class="search-clear" id="search-clear">✕</button>
    </div>

    <div id="body">
      <nav id="sidebar">
        <div id="folder-tree">
          <p class="placeholder-text">Clique em + Add Folder</p>
        </div>
      </nav>

      <main id="content">
        <div id="file-list-container">
          <div id="file-list"></div>
        </div>

        <div id="preview-panel" class="hidden">
          <div class="preview-header">
            <span id="preview-filename">nome_do_arquivo.wav</span>
            <button id="btn-close-preview">✕</button>
          </div>
          <div id="waveform-container">
            <canvas id="waveform-canvas"></canvas>
            <div id="playhead"></div>
          </div>
          <div class="preview-controls">
            <button class="btn-play" id="btn-play">▶</button>
            <span id="preview-time">0:00 / 0:00</span>
            <input type="range" id="volume-slider" min="0" max="100" value="80">
          </div>
        </div>
      </main>
    </div>

    <footer id="footer">
      <div id="status-bar"><span id="status-text">Pronto.</span></div>
      <button id="btn-insert" disabled>▶ Inserir na Timeline</button>
    </footer>
  </div>

  <div id="toast"></div>

  <script src="lib/CSInterface.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/audioPreview.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
