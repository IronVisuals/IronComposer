<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IronComposer</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <div id="app">

    <!-- TOOLBAR -->
    <header id="toolbar">
      <span id="logo">⚙ IronComposer</span>
      <div class="toolbar-actions">
        <button id="btn-add-folder" class="btn-toolbar" title="Adicionar pasta da biblioteca">
          + Add Folder
        </button>
      </div>
    </header>

    <!-- TABS -->
    <div id="tabs">
      <div class="tab active" data-tab="browse">Browse</div>
      <div class="tab" data-tab="favorites">★ Favoritos</div>
    </div>

    <!-- SEARCH BAR -->
    <div id="search-bar">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="search-input"
        placeholder="Pesquisar arquivos em todas as pastas..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-clear" id="search-clear" title="Limpar busca">✕</button>
    </div>

    <!-- BODY: sidebar + área principal -->
    <div id="body">

      <!-- SIDEBAR: árvore de pastas -->
      <nav id="sidebar">
        <div id="folder-tree">
          <p class="placeholder-text">
            Clique em <strong>+ Add Folder</strong><br>para começar.
          </p>
        </div>
      </nav>

      <!-- ÁREA PRINCIPAL: lista de arquivos + preview -->
      <main id="main-area">

        <div id="file-list-container">
          <div id="file-list">
            <p class="placeholder-text">Selecione uma pasta na barra lateral.</p>
          </div>
        </div>

        <!-- PREVIEW DE MÍDIA VISUAL (vídeo, imagem, MOGRT) -->
        <div id="media-preview" class="hidden">
          <div class="preview-header">
            <span class="icon" id="media-preview-icon">▣</span>
            <span class="preview-name" id="media-preview-name">—</span>
          </div>
          <div id="media-preview-body">
            <p class="placeholder-text compact">Selecione uma mídia para preview.</p>
          </div>
          <div class="media-preview-meta" id="media-preview-meta">—</div>
        </div>

        <!-- PREVIEW DE ÁUDIO -->
        <div id="audio-preview" class="hidden">
          <div class="preview-header">
            <span class="icon">🎵</span>
            <span class="preview-name" id="preview-name">—</span>
          </div>

          <div id="waveform-container">
            <canvas id="waveform-canvas"></canvas>
            <div id="waveform-loading">Carregando áudio...</div>
            <div id="playhead"></div>
          </div>

          <div class="preview-controls">
            <button class="btn-play" id="btn-play" title="Tocar/Pausar">▶</button>
            <span class="preview-time" id="preview-time">0:00 / 0:00</span>
            <div class="volume-control">
              <span class="volume-icon" id="volume-icon" title="Mutar">🔊</span>
              <input type="range" id="volume-slider" min="0" max="100" value="80">
            </div>
          </div>
        </div>

      </main>

    </div><!-- /body -->

    <!-- FOOTER -->
    <footer id="footer">
      <div id="status-bar">
        <span id="status-text">Pronto.</span>
      </div>
      <button id="btn-insert" disabled>
        ▶ Inserir na Timeline
      </button>
    </footer>

  </div><!-- /app -->

  <!-- TOAST (notificações) -->
  <div id="toast"></div>

  <!-- MODAL de confirmação -->
  <div id="modal-overlay" class="hidden">
    <div class="modal-box">
      <h2 id="modal-title">Confirmar</h2>
      <p id="modal-message">Mensagem aqui...</p>
      <div class="modal-actions">
        <button id="modal-cancel">Cancelar</button>
        <button id="modal-confirm" class="primary">OK</button>
      </div>
    </div>
  </div>

  <!-- SCRIPTS - ordem importa! -->
  <script src="./lib/CSInterface.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/audioPreview.js"></script>
  <script src="./js/favorites.js"></script>
  <script src="./js/main.js"></script>

</body>
</html>
