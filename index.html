<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IronComposer</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <div id="app">

    <header id="toolbar">
      <span id="logo">⚙ IronComposer</span>
      <button id="btn-add-folder" title="Adicionar Pasta" style="background: var(--accent); color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold;">+ ADD FOLDER</button>
    </header>

    <div id="search-bar">
      <input
        type="text"
        id="search-input"
        placeholder="Pesquisar em todas as pastas..."
        autocomplete="off"
      />
    </div>

    <div id="body">

      <nav id="sidebar">
        <div id="folder-tree">
          <p class="placeholder-text" style="padding: 10px; font-size: 9px;">Clique em + ADD FOLDER para começar.</p>
        </div>
      </nav>

      <main id="main-area">
        <div id="file-list">
          <p class="placeholder-text">
            Selecione uma pasta à esquerda.
          </p>
        </div>
      </main>

    </div>

    <footer id="footer">
      <div id="status-bar">
        <span id="status-text">Pronto.</span>
      </div>
      <button id="btn-insert" disabled>
        ▶ Inserir na Timeline
      </button>
    </footer>

  </div>

  <script src="./lib/CSInterface.js"></script>
  <script src="./js/main.js"></script>

</body>
</html>
